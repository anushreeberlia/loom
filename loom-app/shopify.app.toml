# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
#
# application_url is a placeholder. The iframe loads this URL in Admin. If you see "Example Domain",
# Partners still has example.com — run `shopify app dev` (Update URLs: Yes) or set App URL in
# Partners → App setup to your CLI tunnel (e.g. https://xxxx.trycloudflare.com).
#
# Production shape (example):
#   application_url = "https://app.yourdomain.com"
#   Same host must be SHOPIFY_APP_URL on the server + LOOM_BACKEND_URL → your Python API.

client_id = "4ece48486b41429087fcd48fbe73ea83"
name = "loom-app"
# Production: must match SHOPIFY_APP_URL on Railway and Partners "App URL" (iframe loads this host).
application_url = "https://loom-production-6857.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "products/create" ]
  uri = "/webhooks/product/created"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"

[auth]
# Must match authPathPrefix "/auth" in app/shopify.server.ts (not /api/auth).
redirect_urls = [ "https://loom-production-6857.up.railway.app/auth/callback" ]

