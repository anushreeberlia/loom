# Multi-head training configuration
# All heads use contrastive learning (InfoNCE) on pre-computed DINOv2 embeddings.
# The compat_head additionally trains a joint compatibility scorer (BCE loss).

data:
  # Merged training data (Polyvore + DeepFashion + Pinterest + FashionStylist + FashionRec)
  # Run: python train/data/merge_datasets.py --output-dir data/merged
  # Then: python train/precompute_backbones.py --data-dir data/merged
  data_dir: "data/merged"
  backbone_embeddings: "data/merged/backbone_embeddings.h5"
  compat_pairs: "data/merged/compat_pairs.csv"
  style_pairs: "data/merged/style_pairs.csv"
  occasion_pairs: "data/merged/occasion_pairs.csv"
  fit_pairs: "data/merged/fit_pairs.csv"
  material_pairs: "data/merged/material_pairs.csv"

  # Legacy single-source paths (for reference / fallback)
  # polyvore_dir: "data/polyvore"
  # deepfashion_dir: "data/deepfashion"

  # Source weights used by merge_datasets.py
  merge_weights:
    polyvore: 1.0
    deepfashion: 1.0
    pinterest: 3.0
    fashionstylist: 2.5
    fashionrec: 1.5

model:
  backbone_dim: 768
  hidden_dim: 256
  output_dim: 128
  scorer_hidden_dims: [128, 64]  # MLP layers for compatibility scorer

training:
  # Contrastive learning (InfoNCE)
  temperature: 0.07          # tau -- lower = sharper similarity distribution
  batch_size: 256            # pairs per batch
  epochs: 30                 # per head
  learning_rate: 1.0e-3      # AdamW
  weight_decay: 1.0e-4
  warmup_epochs: 3           # linear warmup

  # Compatibility scorer (joint training with compat_head)
  scorer_weight: 0.5         # loss = contrastive_loss + scorer_weight * bce_loss
  hard_negative_mining: true # after epoch 10, mine hard negatives from model errors
  hard_neg_start_epoch: 10

  # Data splits
  train_split: 0.85
  val_split: 0.10
  test_split: 0.05

  # Early stopping
  patience: 5                # stop if val loss doesn't improve for N epochs
  
  # Checkpointing
  save_every_epochs: 5
  checkpoint_dir: "train/checkpoints"

output:
  weights_dir: "models/multihead"  # final .npz weights saved here

# Per-head overrides (optional)
head_overrides:
  compat:
    epochs: 40               # more epochs since it's the most important head
    batch_size: 512
  style:
    temperature: 0.05        # sharper for style (finer distinctions)
  occasion:
    epochs: 20               # less data, fewer epochs
  fit:
    epochs: 20
  material:
    epochs: 20
