# Training config for occasion/fit/material heads using iMaterialist Fashion attributes.
# Dataset: 1M+ images, 228 attributes across 8 expert-curated groups.
# Paper: "The iMaterialist Fashion Attribute Dataset" (ICCV 2019 Workshop)

data:
  imaterialist_dir: "data/imaterialist"
  backbone_embeddings: "data/imaterialist/backbone_embeddings.h5"
  occasion_pairs: "data/imaterialist/occasion_pairs.csv"
  fit_pairs: "data/imaterialist/fit_pairs.csv"
  material_pairs: "data/imaterialist/material_pairs.csv"
  # Not used for attribute heads
  compat_pairs: ""
  style_pairs: ""

model:
  backbone_dim: 768
  hidden_dim: 256
  output_dim: 128
  scorer_hidden_dims: [128, 64]

training:
  temperature: 0.07
  batch_size: 256
  epochs: 20
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  warmup_epochs: 2
  scorer_weight: 0.0
  hard_negative_mining: false
  hard_neg_start_epoch: 10
  train_split: 0.85
  val_split: 0.10
  test_split: 0.05
  patience: 5
  save_every_epochs: 5
  checkpoint_dir: "train/checkpoints"

output:
  weights_dir: "models/multihead"

head_overrides:
  occasion:
    temperature: 0.05
    epochs: 25
  fit:
    temperature: 0.07
    epochs: 20
  material:
    temperature: 0.05
    epochs: 25
