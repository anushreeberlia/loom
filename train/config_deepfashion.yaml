# Training config for occasion/fit/material heads using DeepFashion attributes.
# Uses the DeepFashion Category & Attribute Prediction benchmark (289K images, 1000 attributes).

data:
  deepfashion_dir: "data/deepfashion"
  backbone_embeddings: "data/deepfashion/backbone_embeddings.h5"
  occasion_pairs: "data/deepfashion/occasion_pairs.csv"
  fit_pairs: "data/deepfashion/fit_pairs.csv"
  material_pairs: "data/deepfashion/material_pairs.csv"
  # Not used for these heads but needed by the script
  compat_pairs: ""
  style_pairs: ""

model:
  backbone_dim: 768
  hidden_dim: 256
  output_dim: 128
  scorer_hidden_dims: [128, 64]

training:
  temperature: 0.07
  batch_size: 256
  epochs: 20
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  warmup_epochs: 2
  scorer_weight: 0.5
  hard_negative_mining: false
  hard_neg_start_epoch: 10
  train_split: 0.85
  val_split: 0.10
  test_split: 0.05
  patience: 5
  save_every_epochs: 5
  checkpoint_dir: "train/checkpoints"

output:
  weights_dir: "models/multihead"

head_overrides:
  occasion:
    temperature: 0.05
    epochs: 25
  fit:
    temperature: 0.07
    epochs: 20
  material:
    temperature: 0.05
    epochs: 25
